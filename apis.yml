aid: amazon-healthlake
name: Amazon HealthLake
description: Amazon HealthLake is a HIPAA-eligible service that gives healthcare providers, health insurance companies, and
  pharmaceutical companies the ability to store, transform, query, and analyze health data at scale in the cloud. It uses
  the Fast Healthcare Interoperability Resources (FHIR) standard.
