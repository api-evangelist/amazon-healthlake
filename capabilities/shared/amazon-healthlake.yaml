name: Amazon HealthLake
version: 1.0.0-alpha1
description: Shared per-API capability definitions for Amazon HealthLake — HIPAA-eligible FHIR health data storage and analytics service.
operations:
  datastores:
    - operationId: CreateFHIRDatastore
      summary: Amazon HealthLake Create FHIR Datastore
      method: POST
      path: /datastore
    - operationId: DeleteFHIRDatastore
      summary: Amazon HealthLake Delete FHIR Datastore
      method: DELETE
      path: /datastore/{DatastoreId}
    - operationId: DescribeFHIRDatastore
      summary: Amazon HealthLake Describe FHIR Datastore
      method: GET
      path: /datastore/{DatastoreId}
    - operationId: ListFHIRDatastores
      summary: Amazon HealthLake List FHIR Datastores
      method: GET
      path: /datastore
  exportJobs:
    - operationId: StartFHIRExportJob
      summary: Amazon HealthLake Start FHIR Export Job
      method: POST
      path: /datastore/{DatastoreId}/fhirExport
    - operationId: DescribeFHIRExportJob
      summary: Amazon HealthLake Describe FHIR Export Job
      method: GET
      path: /datastore/{DatastoreId}/fhirExport/{JobId}
    - operationId: ListFHIRExportJobs
      summary: Amazon HealthLake List FHIR Export Jobs
      method: GET
      path: /datastore/{DatastoreId}/fhirExport
  importJobs:
    - operationId: StartFHIRImportJob
      summary: Amazon HealthLake Start FHIR Import Job
      method: POST
      path: /datastore/{DatastoreId}/fhirImport
    - operationId: DescribeFHIRImportJob
      summary: Amazon HealthLake Describe FHIR Import Job
      method: GET
      path: /datastore/{DatastoreId}/fhirImport/{JobId}
    - operationId: ListFHIRImportJobs
      summary: Amazon HealthLake List FHIR Import Jobs
      method: GET
      path: /datastore/{DatastoreId}/fhirImport
  tags:
    - operationId: ListTagsForResource
      summary: Amazon HealthLake List Tags for Resource
      method: GET
      path: /tags/{ResourceARN}
    - operationId: TagResource
      summary: Amazon HealthLake Tag Resource
      method: POST
      path: /tags/{ResourceARN}
    - operationId: UntagResource
      summary: Amazon HealthLake Untag Resource
      method: DELETE
      path: /tags/{ResourceARN}
