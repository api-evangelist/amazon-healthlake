name: Amazon HealthLake Health Data Operations
version: 1.0.0-alpha1
description: Workflow capability for managing FHIR health data including datastores, import and export jobs.
persona:
  - Healthcare Developer
  - FHIR Data Engineer
  - HIPAA Compliance Officer
apis:
  - Amazon HealthLake
tools:
  - name: create_fhir_datastore
    description: Create a new FHIR datastore for health data storage
    operationId: CreateFHIRDatastore
    method: POST
    path: /datastore
  - name: list_fhir_datastores
    description: List all FHIR datastores in the account
    operationId: ListFHIRDatastores
    method: GET
    path: /datastore
  - name: describe_fhir_datastore
    description: Get details of a specific FHIR datastore
    operationId: DescribeFHIRDatastore
    method: GET
    path: /datastore/{DatastoreId}
  - name: delete_fhir_datastore
    description: Delete a FHIR datastore
    operationId: DeleteFHIRDatastore
    method: DELETE
    path: /datastore/{DatastoreId}
  - name: start_fhir_import_job
    description: Start a FHIR import job to load health data
    operationId: StartFHIRImportJob
    method: POST
    path: /datastore/{DatastoreId}/fhirImport
  - name: describe_fhir_import_job
    description: Get status of a FHIR import job
    operationId: DescribeFHIRImportJob
    method: GET
    path: /datastore/{DatastoreId}/fhirImport/{JobId}
  - name: list_fhir_import_jobs
    description: List all FHIR import jobs for a datastore
    operationId: ListFHIRImportJobs
    method: GET
    path: /datastore/{DatastoreId}/fhirImport
  - name: start_fhir_export_job
    description: Start a FHIR export job to export health data
    operationId: StartFHIRExportJob
    method: POST
    path: /datastore/{DatastoreId}/fhirExport
  - name: describe_fhir_export_job
    description: Get status of a FHIR export job
    operationId: DescribeFHIRExportJob
    method: GET
    path: /datastore/{DatastoreId}/fhirExport/{JobId}
  - name: list_fhir_export_jobs
    description: List all FHIR export jobs for a datastore
    operationId: ListFHIRExportJobs
    method: GET
    path: /datastore/{DatastoreId}/fhirExport
